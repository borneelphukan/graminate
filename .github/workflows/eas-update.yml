name: Mobile App EAS Update

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
  workflow_dispatch:
    inputs:
      message:
        description: 'Update message'
        required: true
        default: 'Manual update'

permissions:
  contents: read

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.3

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish EAS Update
        working-directory: ./apps/mobile
        run: eas update --branch main --message "${{ github.event.inputs.message || github.event.head_commit.message || 'Auto-update from CI' }}" --non-interactive
