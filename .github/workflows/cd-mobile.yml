name: Mobile App CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android

# Security: Principle of least privilege. Prevent workflows from modifying repo contents.
permissions:
  contents: read

jobs:
  build:
    name: Build via EAS
    runs-on: ubuntu-latest
    # Security: Prevent rogue/stuck processes from burning runner minutes
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8.15.3

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Mobile App
        working-directory: ./apps/mobile
        run: eas build --platform ${{ github.event.inputs.platform || 'all' }} --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive
