name: Backend CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'

# Security: Principle of least privilege. Prevent workflows from modifying repo contents.
permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    # Security: Prevent rogue/stuck processes from burning runner minutes
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.3

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Database Migrations
        env:
          # This should be your production database URL stored in GitHub Secrets
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: pnpm --filter backend exec prisma migrate deploy

      - name: Trigger Webhook Deployment
        env:
          DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "DEPLOY_HOOK_URL secret is not set, skipping webhook trigger."
            exit 0
          fi
          curl -X POST "$DEPLOY_HOOK_URL"
